<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DogLight</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 16px;
        min-width: 320px;
        background: #111827;
        color: #f9fafb;
      }
      h1 { font-size: 18px; margin: 0 0 12px; }
      h2 { font-size: 15px; margin: 0 0 8px; }
      .row { margin-bottom: 8px; }
      button { margin-top: 8px; padding: 8px 10px; border: none; border-radius: 6px; cursor: pointer; background: #2563eb; color: white; }
      button.secondary { background: #374151; }
      .panel { background: #1f2937; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
      .session-card { background: #111827; border: 1px solid #374151; border-radius: 8px; padding: 10px; margin-bottom: 8px; }
      .session-card .meta { color: #9ca3af; font-size: 12px; margin-top: 6px; }
      details { margin-top: 8px; }
      summary { cursor: pointer; color: #93c5fd; }
      pre { white-space: pre-wrap; word-break: break-word; font-size: 12px; margin-top: 6px; }
    </style>
  </head>
  <body>
    <div class="panel">
      <h1>DogLight</h1>
      <div class="row">Latest stats: <span id="statsSummary">None yet</span></div>
      <div class="row">Latest recent stats: <span id="recentSummary">None yet</span></div>
      <div class="row">Active session: <span id="sessionSummary">None</span></div>
      <button id="refresh">Refresh</button>
      <button id="export" class="secondary">Export JSON</button>
      <button id="openFullPage" class="secondary">Open full viewer</button>
    </div>
    <div class="panel">
      <h2>Saved game sessions</h2>
      <div id="sessionsList">Loading…</div>
    </div>
    <script type="module" src="./viewer.ts"></script>
  </body>
</html>
